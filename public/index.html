<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PM Drill — 第一性原理訓練器</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/fix-targets.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F2F0EB">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- SIT-7 F4: preload font CSS to trigger font fetch earlier (cheaper than woff2 hash hunting) -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap">
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <h1 class="visually-hidden">PM Drill — 第一性原理訓練器</h1>
    <nav class="navbar">
      <div class="navbar-left">
        <button class="btn-icon" id="btn-hamburger" aria-label="開啟選單"><i class="ph ph-list"></i></button>
        <span class="navbar-logo">
          <span class="navbar-favicon"><i class="ph ph-circles-three"></i></span>
          PM Drill
        </span>
        <div class="navbar-tabs hide-mobile" id="navbar-tabs">
          <span class="navbar-tab" data-nav="circles">CIRCLES</span>
          <span class="navbar-tab" data-nav="nsm">北極星指標</span>
        </div>
      </div>
      <div class="navbar-actions" id="navbar-actions"></div>
    </nav>
    <div id="offcanvas-overlay" class="offcanvas-overlay"></div>
    <div id="offcanvas" class="offcanvas" role="dialog" aria-label="練習記錄">
      <div class="offcanvas-header">
        <span style="font-weight:700">練習記錄</span>
        <button class="btn-icon" id="btn-offcanvas-close" aria-label="關閉"><i class="ph ph-x"></i></button>
      </div>
      <div id="offcanvas-list" class="offcanvas-list">載入中…</div>
    </div>
    <main id="main"></main>
    <!-- Rich-text mobile sticky toolbar (Phase 3 Spec 4) -->
    <div class="rt-toolbar-mobile" id="rt-toolbar-mobile" style="display:none">
      <button type="button" class="rt-mtbtn" data-rt-action="bold" aria-label="粗體"><strong>B</strong></button>
      <button type="button" class="rt-mtbtn" data-rt-action="bullet" aria-label="列點"><i class="ph ph-list-bullets"></i></button>
      <button type="button" class="rt-mtbtn" data-rt-action="indent" aria-label="增加縮排"><i class="ph ph-text-indent"></i></button>
      <button type="button" class="rt-mtbtn" data-rt-action="outdent" aria-label="減少縮排"><i class="ph ph-text-outdent"></i></button>
    </div>
  </div>
  <script src="/circles-db.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
